<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E89B2C"/>
      <stop offset="100%" stop-color="#B26A14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#E89B2C" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#E89B2C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#E89B2C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="#1A1612"/>

  <!-- soft amber halo -->
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- outer ring -->
  <circle cx="512" cy="512" r="430" fill="none" stroke="#E89B2C" stroke-opacity="0.14" stroke-width="6"/>

  <!-- mid ring -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#E89B2C" stroke-opacity="0.28" stroke-width="7"/>

  <!-- inner ring -->
  <circle cx="512" cy="512" r="250" fill="none" stroke="#E89B2C" stroke-opacity="0.5" stroke-width="8"/>

  <!-- core -->
  <circle cx="512" cy="512" r="170" fill="url(#core)"/>

  <!-- highlight on core -->
  <ellipse cx="468" cy="468" rx="70" ry="48" fill="#FAF7F2" fill-opacity="0.18"/>
</svg>
